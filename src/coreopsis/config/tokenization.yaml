%YAML 1.2
---
n_bins: !!int 10
fused: !!bool true
include_numeric_values: !!bool false

ordering:
  - BOS
  - TIME # the timestamp for a time spacing token is at the next event
  - CLCK
  - AGE
  - SEX
  - RACE
  - ETHN
  - ADMN
  - XFR-OUT
  - XFR-IN
  - MED-CTS
  - MED-INT
  - LAB-ORD
  - LAB-RES
  - CODE
  - VTL
  - ASMT
  - RESP
  - POSN
  - CRRT
  - SOFA
  - DSCG
  - EOS

insert_spacers: !!bool false
spacers:
  5m-15m: 5 # produces token TIME//5m-15m
  15m-1h: 15
  1h-2h: 60
  2h-6h: 120
  6h-12h: 360
  12h-1d: 720
  1d-3d: 1440
  3d-1w: 4320
  1w-2w: 10080
  2w-1mt: 20160
  1mt-3mt: 43200
  3mt-6mt: 131490
  6mt+: 262980

insert_clocks: !!bool false
clocks:
  - !!str 00 # produces token CLCK//00
  - !!str 04
  - !!str 08
  - !!str 12
  - !!str 16
  - !!str 20
