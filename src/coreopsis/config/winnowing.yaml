%YAML 1.2
---
outcome_tokens: # supports patterns with fnmatch
  - XFR-IN//icu
  - RESP//imv
  - DSCG//expired
  - LABEL//*

threshold:
  # choose one and only one of the following
  duration_s: !!int 86400 # 24h
  # first_occurrence: XFR-IN//icu

horizon_after_threshold_s: !!int 864000 # 10d outcome window after prediction threshold

splits: #select which splits to prepare
  - train
  - tuning
  - held_out
# rep-based inference requires train and tuning splits
