%YAML 1.2
---
model:
  model_name: meta-llama/Llama-3.2-1B
  model_args:
    hidden_size: !!int 128
    intermediate_size: !!int 512
    num_hidden_layers: !!int 4
    num_attention_heads: !!int 4
    num_key_value_heads: !!int 2
    max_position_embeddings: !!int 32768

max_seq_len: !!int &max_len 4096
n_epochs: !!int 1
run_name: &run_name cotorra

tokens_of_interest: &tois
  - XFR-IN//icu
  - RESP//imv
  - DSCG//expired
  - LABEL//*

wandb:
  project: coreopsis
  run_name: *run_name

custom_loss: !!bool true
quantile_token_loss:
  qt_weight: !!float 0.5
label_weighted_loss:
  tokens_of_interest: *tois
  toi_weight: !!float 20.0

time_based_rope:
  sec_per_pos_id: !!int 300

training_args:
  report_to: wandb
  run_name: *run_name
  per_device_train_batch_size: !!int 4
  per_device_eval_batch_size: !!int 4
  # save_total_limit: !!int 101
  # metric_for_best_model: eval_loss
  # load_best_model_at_end: !!bool true
  greater_is_better: !!bool false
  # eval_strategy: steps # keep eval/save in sync for load_best_model_at_end
  # eval_steps: !!float 0.01 # evaluate every 1/100th of total training steps (1 epoch run)
  # prediction_loss_only: !!bool true # may improve training speed
  # save_strategy: steps
  # save_steps: !!float 0.01 # save checkpoint every 1/100th of total training steps (1 epoch run)
  ddp_find_unused_parameters: !!bool false
  # neftune_noise_alpha: !!float 5.0
  auto_find_batch_size: !!bool false # turning this on may cause issues with hyperparameter tuning
  learning_rate: !!float 2e-4
  gradient_accumulation_steps: !!int 1
  remove_unused_columns: !!bool false # otherwise `s_elapsed` is automatically dropped
  # bf16: !!bool true
  # max_steps: !!int 10 # uncomment for testing purposes only
  num_train_epochs: !!int 3 # thanks @AuroraColombo for pointing out this hf default

tuning_args:
  direction: minimize
  backend: optuna
  n_trials: !!int 10
